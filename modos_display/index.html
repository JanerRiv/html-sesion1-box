<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .elemento{
            display: inline;
            background-color: black;
            color: white;
            width: 200;
            height: 200;           
        }

        .elemento_block{
            display: block;
            background-color: #023;
            color: rgb(228, 62, 62);
            width: 200px;
            height:200px ;

        }
        .resaltado {
            color: blueviolet;
            letter-spacing: 2px;  /* para aumentar la distncia entre letras*/
            font-family: Arial ;
            font-size: large ;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>INLINE:</h1>
    <div class="elemento ">
        Productos
    </div>

    <div class="elemento resaltado "">
        Nosotros
    </div>


    <div class="elemento">
        Servicios
    </div>

    <div class="elemento resaltado ">
        Contacto
    </div>

    <hr>

    <h1>BLOCK</h1> 

    <div class="elemento_block ">
        Productos
    </div>

    <div class="elemento_block  ">
        Nosotros
    </div>


    <div class="elemento_block">
        Servicios
    </div>

    <div class="elemento_block ">
        Contacto
    </div>
</body>
</html>
